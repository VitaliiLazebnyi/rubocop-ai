plugins:
  - rubocop-performance
  - rubocop-rake
  - rubocop-rspec
require:
  - rubocop-thread_safety
  - rubocop-md

AllCops:
  TargetRubyVersion: 4.0
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - 'vendor/**/*'
    - 'sorbet/**/*'
    - 'tmp/**/*'

Style/FrozenStringLiteralComment:
  Enabled: true

RSpec/ExampleLength:
  Max: 15

Layout/LineLength:
  Max: 165

Naming/FileName:
  Exclude:
    - 'lib/rubocop-ai.rb'
    - '**/*.md'

Gemspec/DevelopmentDependencies:
  EnforcedStyle: gemspec

# We need to enforce our own cop internally, but usually RuboCop extensions
# don't test themselves against their own cops. We can include it manually if needed.
